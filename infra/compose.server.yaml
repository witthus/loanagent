# Server test deploy for /opt/loanagent (mainland China mirrors).
name: loanagent

x-security: &default-security
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:
  control-plane:
    <<: *default-security
    build:
      context: ..
      dockerfile: docker/control-plane/Dockerfile.server
    image: loanagent-control-plane:server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-loanagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-loanagent}
      MQTT_URL: mqtt://emqx:1883
      OPS_TOKEN: ${OPS_TOKEN}
      DEVICE_TOKEN: ${DEVICE_TOKEN}
      HEARTBEAT_STALE_AFTER_SEC: ${HEARTBEAT_STALE_AFTER_SEC:-90}
      TASK_QUEUE_TIMEOUT_SEC: ${TASK_QUEUE_TIMEOUT_SEC:-300}
      TASK_EXECUTION_TIMEOUT_SEC: ${TASK_EXECUTION_TIMEOUT_SEC:-900}
      TASK_EFFECT_REPORT_GRACE_SEC: ${TASK_EFFECT_REPORT_GRACE_SEC:-60}
      TASK_TIMEOUT_SCAN_INTERVAL_SEC: ${TASK_TIMEOUT_SCAN_INTERVAL_SEC:-30}
      TASK_RESULT_PAYLOAD_MAX_BYTES: ${TASK_RESULT_PAYLOAD_MAX_BYTES:-1048576}
      MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
      MEDIA_SIGNING_SECRET: ${MEDIA_SIGNING_SECRET:-change-me-media-signing}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://119.45.36.208}
      HTTPS_PUBLIC_BASE_URL: ${HTTPS_PUBLIC_BASE_URL:-}
      OPS_WEB_DIST: /app/static/ops-web
      AGENT_RELEASE_DIR: /app/agent-releases
      UPDATE_MANIFEST_DIR: /app/agent-releases/update-manifests
    volumes:
      - media-data:/app/media
      # APK artifacts stay read-only in-container; manifests need write for Ops publish API.
      - ../agent-releases:/app/agent-releases:ro
      - ../agent-releases/update-manifests:/app/agent-releases/update-manifests
    ports:
      - "80:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/health", timeout=2)
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy

  postgres:
    <<: *default-security
    image: docker.m.daocloud.io/library/postgres:16-alpine
    user: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loanagent}
      POSTGRES_USER: ${POSTGRES_USER:-loanagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loanagent} -d ${POSTGRES_DB:-loanagent}"]
      interval: 5s
      timeout: 3s
      retries: 10

  emqx:
    <<: *default-security
    image: docker.m.daocloud.io/emqx/emqx:5.8.6
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
      EMQX_NODE__COOKIE: ${EMQX_NODE_COOKIE}
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    ports:
      # 1883 often blocked by residential ISPs in CN; 11883 is the public device port.
      - "1883:1883"
      - "11883:1883"
      - "18083:18083"
    healthcheck:
      test: ["CMD-SHELL", "/opt/emqx/bin/emqx ctl status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  postgres-data:
  emqx-data:
  emqx-log:
  media-data:
