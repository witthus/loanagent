{% extends "base.html" %}

{% block title %}Publish{% endblock %}

{% block content %}
<h2>Publish</h2>

{% if error %}
<p style="color: #a00;">{{ error }}</p>
{% endif %}
{% if notice %}
<p>{{ notice }}</p>
{% endif %}

<form method="post" action="/ops/publish" enctype="multipart/form-data">
  <label>
    account_id
    <select name="account_id" required>
      <option value="">Select publisher account</option>
      {% for item in accounts %}
      <option value="{{ item.account.account_id }}">
        {{ item.account.account_id }}
        ({{ item.account.role }}{% if item.online %}, online{% else %}, offline{% endif %})
      </option>
      {% endfor %}
    </select>
  </label>
  <br>
  <label>
    title
    <input name="title" required maxlength="512" size="60">
  </label>
  <br>
  <label>
    body
    <textarea name="body" rows="6" cols="60" required></textarea>
  </label>
  <br>
  <label>
    images
    <input type="file" name="files" accept="image/*" multiple required>
  </label>
  <br>
  <button type="submit">Immediate publish</button>
</form>
{% endblock %}
